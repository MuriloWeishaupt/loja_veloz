name: CI/CD Loja Veloz

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # 1. Checar o código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Logar no Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build e push das imagens
      - name: Build & Push Pedidos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pedidos:1.1 ./pedidos
          docker push $DOCKER_USERNAME/loja_veloz-pedidos:1.1

      - name: Build & Push Pagamentos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pagamentos:1.0 ./pagamentos
          docker push $DOCKER_USERNAME/loja_veloz-pagamentos:1.0

      - name: Build & Push Estoque
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-estoque:1.1 ./estoque
          docker push $DOCKER_USERNAME/loja_veloz-estoque:1.1

      - name: Build & Push Gateway
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-gateway:1.0 ./gateway
          docker push $DOCKER_USERNAME/loja_veloz-gateway:1.0

      # 4. Instalar kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.32.2

      # 5. Criar cluster Kind
      - name: Set up Kind cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: v0.20.0

      # 6. Deploy Postgres
      - name: Deploy Postgres
        run: |
          echo "Aplicando Postgres..."
          kubectl apply -f ./k8s/postgres/ --validate=false
          echo "Aguardando Postgres ficar pronto..."
          kubectl wait --for=condition=available --timeout=120s deployment/postgres
          kubectl get all -n default

      # 7. Deploy Microservices com espera
      - name: Deploy Microservices
        run: |
          echo "Aplicando Pedidos..."
          kubectl apply -f ./k8s/pedidos/
          kubectl wait --for=condition=available --timeout=120s deployment/pedidos

          echo "Aplicando Pagamentos..."
          kubectl apply -f ./k8s/pagamentos/
          kubectl wait --for=condition=available --timeout=120s deployment/pagamentos

          echo "Aplicando Estoque..."
          kubectl apply -f ./k8s/estoque/
          kubectl wait --for=condition=available --timeout=120s deployment/estoque

          echo "Aplicando Gateway..."
          kubectl apply -f ./k8s/gateway/
          kubectl wait --for=condition=available --timeout=120s deployment/gateway

          echo "Todos os microserviços estão rodando:"
          kubectl get all -n default