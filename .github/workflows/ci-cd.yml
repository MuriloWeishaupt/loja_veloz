name: CI/CD Loja Veloz

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # 1. Checar o código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurar Docker
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Buildar e push das imagens
      - name: Build & Push Pedidos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pedidos:1.1 ./services/pedidos
          docker push $DOCKER_USERNAME/loja_veloz-pedidos:1.1

      - name: Build & Push Pagamentos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pagamentos:1.0 ./services/pagamentos
          docker push $DOCKER_USERNAME/loja_veloz-pagamentos:1.0

      - name: Build & Push Estoque
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-estoque:1.1 ./services/estoque
          docker push $DOCKER_USERNAME/loja_veloz-estoque:1.1

      - name: Build & Push Gateway
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-gateway:1.0 ./services/gateway
          docker push $DOCKER_USERNAME/loja_veloz-gateway:1.0

      # 4. Aplicar no Kubernetes
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.32.2


      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f ./k8s/postgres/
          kubectl apply -f ./k8s/pedidos/
          kubectl apply -f ./k8s/pagamentos/
          kubectl apply -f ./k8s/estoque/
          kubectl apply -f ./k8s/gateway/