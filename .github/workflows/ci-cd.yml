name: CI/CD Loja Veloz

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pedidos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # 1. Checar o código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Rodar testes dos microserviços
      - name: Run tests
        run: |
          cd pedidos
          npm install
          chmod +x node_modules/.bin/jest
          npx jest

          cd ../pagamentos
          npm install
          chmod +x node_modules/.bin/jest
          npx jest

          cd ../estoque
          npm install
          chmod +x node_modules/.bin/jest
          npx jest

          cd ../gateway
          npm install
          chmod +x node_modules/.bin/jest
          npx jest

          cd ..
          echo "✅ Todos os testes passaram!"

      # 4. Logar no Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build e push das imagens
      - name: Build & Push Pedidos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pedidos:1.1 ./pedidos
          docker push $DOCKER_USERNAME/loja_veloz-pedidos:1.1

      - name: Build & Push Pagamentos
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-pagamentos:1.0 ./pagamentos
          docker push $DOCKER_USERNAME/loja_veloz-pagamentos:1.0

      - name: Build & Push Estoque
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-estoque:1.1 ./estoque
          docker push $DOCKER_USERNAME/loja_veloz-estoque:1.1

      - name: Build & Push Gateway
        run: |
          docker build -t $DOCKER_USERNAME/loja_veloz-gateway:1.0 ./gateway
          docker push $DOCKER_USERNAME/loja_veloz-gateway:1.0

      # 6. Instalar kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.32.2

      # 7. Instalar Kind manualmente
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # 8. Criar cluster Kind
      - name: Create Kind cluster
        run: |
          kind create cluster --name loja-veloz

      # 9. Deploy Postgres
      - name: Deploy Postgres
        run: |
          echo "Aplicando Postgres..."
          kubectl apply -f ./k8s/postgres/ --validate=false
          echo "Aguardando Postgres ficar pronto..."
          kubectl wait --for=condition=available --timeout=120s deployment/postgres
          kubectl get all -n default

      # 10. Deploy Microservices com espera
      - name: Deploy Microservices
        run: |
          echo "Aplicando Pedidos..."
          kubectl apply -f ./k8s/pedidos/
          kubectl wait --for=condition=available --timeout=120s deployment/pedidos

          echo "Aplicando Pagamentos..."
          kubectl apply -f ./k8s/pagamentos/
          kubectl wait --for=condition=available --timeout=120s deployment/pagamentos

          echo "Aplicando Estoque..."
          kubectl apply -f ./k8s/estoque/
          kubectl wait --for=condition=available --timeout=120s deployment/estoque

          echo "Aplicando Gateway..."
          kubectl apply -f ./k8s/gateway/
          kubectl wait --for=condition=available --timeout=120s deployment/gateway

          echo "✅ Todos os microserviços estão rodando:"
          kubectl get all -n default