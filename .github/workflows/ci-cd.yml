name: CI/CD Loja Veloz

on:
  push:
    branches:
      - main
    pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Pegar o Código
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Configura o Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build e Push das Imagens
    - name: Build and push Pedidos image
      run: |
        docker build -t mweishaupt13/loja_veloz-pedidos:1.1 ./services/pedidos
        docker push mweishaupt13/loja_veloz-pedidos:1.1