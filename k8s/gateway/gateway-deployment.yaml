apiVersion: apps/v1 
kind: Deployment
metadata:
  name: gateway

spec:
  replicas: 1

  selector:
    matchLabels:
      app: gateway

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: gateway

    spec:
      containers:
      - name: gateway
        image: mweishaupt13/loja_veloz-gateway:1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi