apiVersion: apps/v1 
kind: Deployment
metadata:
  name: pedidos

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pedidos

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: pedidos

    spec:
      containers:
      - name: pedidos
        image: mweishaupt13/loja_veloz-pedidos:1.1
        ports:
        - containerPort: 3001
        resources:       
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi